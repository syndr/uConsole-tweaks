# keyd config for the uConsole's internal ZMK keyboard.
#
# Targets ONLY the keyboard sub-device by its full ID (vendor:product:hash) so
# we don't grab the trackball on the same USB composite device.
#
# Bindings:
#   tab   — tap = Tab, hold = Super. overloadt2 commits to hold if Tab is held
#           past timeout OR another key is pressed *and released* while Tab is
#           held. Preserves Shift+Tab and fast tab-tab autocomplete.
#   front — tap = KEY_FRONT (gamepad Select), hold = KEY_F24. KEY_F24 is
#           unmapped in essentially all userspace, so apps don't react to it,
#           but the zmk-cursor-scroll daemon listens for it to enter scroll
#           mode. Prevents Select-press from being seen as a real keystroke
#           (which terminals interpret as "exit scrollback / jump to bottom").
#           timeout(): tap fires if released within window OR another key is
#           struck during the wait — so Select+<other key> chords still work.

[ids]
1d50:615e:93631e17

[main]
tab = overloadt2(meta, tab, 200)
front = timeout(front, 200, f24)

[meta:M]
